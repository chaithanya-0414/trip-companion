services:
  # ─── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: tripsync-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        value: ./firebase-service-account.json
      - key: CORS_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production

  # ─── Frontend (Vite / React) ──────────────────────────────────────────────────
  - type: web
    name: tripsync-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
